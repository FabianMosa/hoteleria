# PostgreSQL local para desarrollo (Prisma).
# Uso: docker compose up -d
# Credenciales deben coincidir con DATABASE_URL en .env (ver .env.example).

services:
  db:
    image: postgres:16-alpine
    container_name: hoteleria-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hoteleria
      POSTGRES_PASSWORD: "*bfms1009*"
      POSTGRES_DB: "hoteleria"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoteleria -d hoteleria"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
